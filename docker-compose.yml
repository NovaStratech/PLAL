services:
  db:
    image: postgres:16-alpine
    container_name: plal_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: plal
      POSTGRES_PASSWORD: plal
      POSTGRES_DB: plal
    ports:
      - "5432:5432"
    volumes:
      - plal_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plal"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  plal_db_data:
